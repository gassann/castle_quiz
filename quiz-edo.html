<!doctype html>
<html lang="ja">
  <head>
  <script src="./ga.js"></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#ffffff">
    <title>江戸城 | お城クイズ</title>
    <link rel="stylesheet" href="./styles.css?v=20260524-sort-csv">
  </head>
  <body>
    <svg class="svg-defs" aria-hidden="true">
      <symbol id="icon-castle" viewBox="0 0 92 72">
        <path d="M18 61h56M24 51h44M30 42h32M11 62l7-13h56l7 13M22 49l7-18h34l7 18M33 40l5-19h16l5 19M17 31h58M26 22h40M35 13h22M40 13l6-7 6 7M24 31l8-9 8 9M52 31l8-9 8 9M34 61V50h24v11M41 61V51M51 61V51" />
      </symbol>
      <symbol id="icon-book" viewBox="0 0 80 80">
        <path d="M22 15h30a8 8 0 0 1 8 8v42H30a8 8 0 0 0-8 8V15Z" />
        <path d="M22 15v58M30 26h20M30 36h17M30 46h14M58 22h7v44h-7" />
        <circle cx="22" cy="63" r="10" />
      </symbol>
      <symbol id="icon-grid" viewBox="0 0 80 80">
        <path d="M18 18h17v13H18zM45 18h17v13H45zM18 40h17v13H18zM45 40h17v13H45zM18 62h44" />
      </symbol>
      <symbol id="icon-crown" viewBox="0 0 80 80">
        <path d="M18 56h44l5-30-16 14-11-20-11 20-16-14 5 30ZM22 64h36" />
      </symbol>
      <symbol id="icon-user" viewBox="0 0 80 80">
        <circle cx="40" cy="28" r="12" />
        <path d="M18 66a22 22 0 0 1 44 0" />
      </symbol>
    </svg>

    <div class="scale-frame">
      <main class="app quiz-app">
        <header class="site-header quiz-site-header">
          <a class="back-link" href="./index.html#categories" aria-label="カテゴリーへ戻る">‹</a>
          <a class="brand" href="./index.html" aria-label="お城クイズ ホーム">
            <img class="brand-castle-img" src="./assets/castle_icon.png" alt="">
            <span>お城クイズ</span>
          </a>
          <span class="header-badge">江戸城</span>
        </header>

        <section class="quiz-stage" aria-live="polite">
          <div class="quiz-progress">
            <span id="question-count">Q1 / 10</span>
            <span id="score-count">正解 0</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <span id="progress-bar"></span>
          </div>

          <article class="question-panel" id="question-panel">
            <p class="question-label" id="question-label">第1問</p>
            <h2 id="question-text"></h2>
            <div class="answer-list" id="answer-list"></div>
          </article>

          <div class="feedback-panel" id="feedback-panel" hidden>
            <p class="feedback-result" id="feedback-result"></p>
            <p class="feedback-copy" id="feedback-copy"></p>
            <button class="quiz-button" id="next-button" type="button">次の問題へ</button>
          </div>

          <section class="result-panel" id="result-panel" hidden>
            <p class="result-kicker">結果発表</p>
            <h2 id="result-title"></h2>
            <p class="result-score" id="result-score"></p>
            <p class="result-copy" id="result-copy"></p>
            <div class="result-actions">
              <button class="quiz-button" id="retry-button" type="button">もう一度挑戦</button>
              <a class="quiz-secondary-button" href="./index.html#categories">カテゴリーへ戻る</a>
            </div>
          </section>
        </section>

        <nav class="bottom-nav" aria-label="主要ナビゲーション">
          <a href="./index.html"><img class="nav-castle-img" src="./assets/castle_icon.png" alt=""><span>ホーム</span></a>
          <a href="./categories.html" aria-current="page"><svg aria-hidden="true"><use href="#icon-grid"></use></svg><span>カテゴリ</span></a>
          <a href="./review.html"><svg aria-hidden="true"><use href="#icon-book"></use></svg><span>復習</span></a>
          <a href="./ranking.html"><svg aria-hidden="true"><use href="#icon-crown"></use></svg><span>ランキング</span></a>
          <a href="./titles.html"><svg aria-hidden="true"><use href="#icon-user"></use></svg><span>称号</span></a>
        </nav>
      </main>
    </div>

    <script src="./quiz-12-tenju-beginner.js?v=20260527-quiz-config"></script>
  </body>
</html>
